<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional QR Code Generator</title>

    <!-- Premium Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="qr-card">
        <div class="logo-area">
          <div class="icon-shape">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="5" height="5" x="3" y="3" rx="1" />
              <rect width="5" height="5" x="16" y="3" rx="1" />
              <rect width="5" height="5" x="3" y="16" rx="1" />
              <path d="M21 16V21H16" />
              <path d="M21 12H16V16" />
            </svg>
          </div>
        </div>
        <h2>QR Code Generator</h2>
        <p class="subtitle">
          Transform any link, text, or digital identity into a clean, scannable
          QR code instantly.
        </p>

        <div class="input-group">
          <input
            type="text"
            id="qr-input"
            placeholder="Paste your link or type text here..."
          />
        </div>

        <button id="generate-btn">Generate QR Code</button>

        <div id="qr-box" class="qr-box hidden">
          <div class="qr-wrapper">
            <img src="" id="qr-image" alt="Generated QR Code" />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
