<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional QR Code Studio</title>

    <link rel="icon" type="image/png" href="bg video/qr-studio-code.png" />

    <!-- Premium Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOCAL BACKGROUND VIDEO LAYER -->
    <video autoplay muted loop playsinline id="bg-video">
      <source
        src="bg video/give_me_one_video_for_my_site.mp4"
        type="video/mp4"
      />
    </video>
    <div class="video-overlay"></div>

    <!-- MAIN APP WRAPPER -->
    <div class="app-container">
      <!-- Unified Master Generator Card -->
      <div class="qr-card">
        <div class="logo-area">
          <div class="icon-shape">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="5" height="5" x="3" y="3" rx="1" />
              <rect width="5" height="5" x="16" y="3" rx="1" />
              <rect width="5" height="5" x="3" y="16" rx="1" />
              <path d="M21 16V21H16" />
              <path d="M21 12H16V16" />
            </svg>
          </div>
        </div>
        <h2>QR Code Studio</h2>
        <p class="subtitle">
          Convert any URL, text, or digital link into a clean, professional
          scannable QR code instantly.
        </p>

        <!-- Link Pasting Box -->
        <div class="input-group">
          <input
            type="text"
            id="qr-input"
            placeholder="Paste your link or type text here..."
          />
        </div>

        <!-- Integrated 1-2-3 Workflow Stepper -->
        <div class="compact-workflow">
          <div class="workflow-step">
            <div class="step-badge">1</div>
            <p class="step-text">Copy target link</p>
          </div>
          <div class="step-line"></div>
          <div class="workflow-step">
            <div class="step-badge">2</div>
            <p class="step-text">Paste & generate</p>
          </div>
          <div class="step-line"></div>
          <div class="workflow-step">
            <div class="step-badge">3</div>
            <p class="step-text">Scan or download</p>
          </div>
        </div>

        <button id="generate-btn">Generate QR Code</button>

        <!-- Dynamic Result Area -->
        <div id="qr-box" class="qr-box hidden">
          <div class="qr-wrapper">
            <img src="" id="qr-image" alt="Generated QR Code" />
          </div>
          <div class="action-buttons">
            <button id="download-btn" class="secondary-btn">Download QR</button>
            <button id="copy-btn" class="secondary-btn">Copy Image</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
